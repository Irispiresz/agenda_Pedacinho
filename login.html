<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Login - Pedacinho de Amor</title>
    <link rel="stylesheet" href="css_pda/style_pda.css">
    <link rel="stylesheet" href="bootstrap.min.css">
</head>
<body>
    <h1>Entrar / Cadastrar</h1>
    <div class="card">
        <div class="tabs">
            <button id="tab-login" class="active">Login</button>
            <button id="tab-register">Cadastro</button>
        </div>

        <form id="loginForm" class="active">
            <label>Email</label>
            <input type="email" id="loginEmail" required>
            <label>Senha</label>
            <input type="password" id="loginPassword" required>
            <div class="actions">
                <button type="button" id="btnLogin">Entrar</button>
            </div>
            <p id="loginMsg"></p>
        </form>

        <form id="registerForm">
            <label>Nome</label>
            <input type="text" id="regName" required>
            <label>Email</label>
            <input type="email" id="regEmail" required>
            <label>Senha</label>
            <input type="password" id="regPassword" required>
            <label>Confirmar senha</label>
            <input type="password" id="regPassword2" required>
            <div class="actions">
                <button type="button" id="btnRegister">Cadastrar</button>
            </div>
            <p id="regMsg"></p>
        </form>
    </div>

<script>
// Simple demo auth using localStorage (NOT for production)
function getUsers(){
    try{return JSON.parse(localStorage.getItem('pda_users')||'{}')}catch(e){return{}}
}
function saveUsers(u){localStorage.setItem('pda_users', JSON.stringify(u))}

// Tabs
const tabLogin = document.getElementById('tab-login');
const tabRegister = document.getElementById('tab-register');
const loginForm = document.getElementById('loginForm');
const registerForm = document.getElementById('registerForm');

tabLogin.addEventListener('click', ()=>{tabLogin.classList.add('active');tabRegister.classList.remove('active');loginForm.classList.add('active');registerForm.classList.remove('active')});
tabRegister.addEventListener('click', ()=>{tabRegister.classList.add('active');tabLogin.classList.remove('active');registerForm.classList.add('active');loginForm.classList.remove('active')});

// Register
document.getElementById('btnRegister').addEventListener('click', ()=>{
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim().toLowerCase();
    const pass = document.getElementById('regPassword').value;
    const pass2 = document.getElementById('regPassword2').value;
    const msg = document.getElementById('regMsg');
    msg.className=''; msg.textContent='';
    if(!name||!email||!pass){msg.className='error'; msg.textContent='Preencha todos os campos.'; return}
    if(pass !== pass2){msg.className='error'; msg.textContent='Senhas não conferem.'; return}
    const users = getUsers();
    if(users[email]){msg.className='error'; msg.textContent='Email já cadastrado.'; return}
    users[email] = {name, password: pass};
    saveUsers(users);
    msg.className='message'; msg.textContent='Cadastro realizado. Você pode entrar agora.';
    // switch to login
    tabLogin.click();
});

// Login
document.getElementById('btnLogin').addEventListener('click', ()=>{
    const email = document.getElementById('loginEmail').value.trim().toLowerCase();
    const pass = document.getElementById('loginPassword').value;
    const msg = document.getElementById('loginMsg');
    msg.className=''; msg.textContent='';
    if(!email||!pass){msg.className='error'; msg.textContent='Preencha email e senha.'; return}
    const users = getUsers();
    const user = users[email];
    if(!user || user.password !== pass){msg.className='error'; msg.textContent='Email ou senha inválidos.'; return}
    msg.className='message'; msg.textContent=`Olá, ${user.name}! Login efetuado.`;
    // example: redirect to index
    setTimeout(()=>{window.location.href='index.html'},800);
});
</script>
</body>
</html>
